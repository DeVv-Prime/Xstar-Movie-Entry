services:
  - type: web
    name: xstar-movie-recommendations
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: TMDB_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
    autoDeploy: true
    plan: free
    healthCheckPath: /
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
